<div class="container">
  <mat-toolbar color="primary" class="toolbar">
    <span>USUÁRIOS</span>
    <div class="spacer"></div>
    <mat-form-field appearance="outline" class="search-field" subscriptSizing="dynamic">
      <mat-label>Pesquisar...</mat-label>
      <input matInput [formControl]="searchControl" placeholder="Nome ou e-mail">
      <mat-icon matPrefix>search</mat-icon>
    </mat-form-field>
  </mat-toolbar>

  <div class="content">
    <h2 class="title">Usuários cadastrados</h2>

    <div *ngIf="loading()" class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="error()" class="error-message">
      <mat-icon>error</mat-icon>
      <span>{{ error() }}</span>
      <button mat-button (click)="loadUsers()">Tentar novamente</button>
    </div>

    <div *ngIf="!loading() && !error()" class="user-grid">
      <attus-user-card 
        *ngFor="let user of users()" 
        [user]="user" 
        (edit)="onEdit($event)"
        (delete)="onDelete($event)">
      </attus-user-card>

      <div *ngIf="users().length === 0" class="no-results">
        Nenhum usuário encontrado.
      </div>
    </div>

    <mat-paginator
      [length]="totalUsers()"
      [pageSize]="pageSize()"
      [pageSizeOptions]="[5, 10, 25]"
      (page)="onPageChange($event)"
      aria-label="Selecionar página">
    </mat-paginator>
  </div>

  <button mat-fab color="warn" class="fab-button" (click)="openAddDialog()" aria-label="Adicionar usuário">
    <mat-icon>add</mat-icon>
  </button>
</div>
